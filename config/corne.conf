# Базовые настройки BLE
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3

# Оптимизация соединения
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y  # Улучшенный алгоритм подключения
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y      # (У вас уже есть)

# Режим сна и энергопотребление
CONFIG_ZMK_SLEEP=y                  # (У вас уже есть)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000 # Сон через 5 мин (300.000 мс) 
# CONFIG_ZMK_EXT_POWER=y              # Поддержка внешнего питания (если есть)

# Если были проблемы с подключением:
CONFIG_ZMK_BLE_SECURITY_LEVEL=1     # "Just Works" без шифрования
CONFIG_BT_SMP_SC_ONLY=n             # Разрешить legacy pairing
