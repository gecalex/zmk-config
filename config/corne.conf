# Базовые настройки
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3

# Настройки питания
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Безопасность
CONFIG_ZMK_BLE_SECURITY_LEVEL=1
CONFIG_BT_SMP_SC_ONLY=n

# Дополнительно
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
